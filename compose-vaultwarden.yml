services:
  vaultwarden:
    mem_limit: 128m
    memswap_limit: 128m
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://vault.pietrohome.it"
    volumes:
      - /home/vaultwarden/data/:/data/
    ports:
      - 888:80
    networks:
      - docker-service

networks:
  docker-service:
    external: true